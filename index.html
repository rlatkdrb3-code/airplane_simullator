<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비행기 탑승 대기행렬 시뮬레이터</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Queueing Theory Boarding Lab</p>
          <h1>비행기 좌석 배정 방식별 탑승 시뮬레이터</h1>
          <p class="lead">
            랜덤 탑승, 뒷자리 우선, 창가자리 우선, WilMA, 역피라미드 방식의 통로 정체와 좌석 간섭을 비교합니다.
          </p>
        </div>
        <div class="summary-panel" aria-label="현재 시뮬레이션 요약">
          <div>
            <span>총 탑승 시간</span>
            <strong id="totalTime">0초</strong>
          </div>
          <div>
            <span>통로 정체</span>
            <strong id="blockedTicks">0회</strong>
          </div>
          <div>
            <span>좌석 간섭</span>
            <strong id="seatInterference">0회</strong>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="controls" aria-label="시뮬레이션 설정">
          <h2>탑승 조건</h2>

          <label>
            탑승 방식
            <select id="strategy">
              <option value="random">랜덤 탑승</option>
              <option value="backToFront">뒷자리부터 탑승</option>
              <option value="windowFirst">창가자리부터 탑승</option>
              <option value="wilma">WilMA: 창가-중간-통로</option>
              <option value="insideOutOddEven">안쪽부터 홀짝 분산</option>
              <option value="reversePyramid">역피라미드</option>
            </select>
          </label>

          <label>
            좌석 점유율
            <input id="loadFactor" type="range" min="40" max="100" value="92" step="1" />
            <span class="range-readout"><span id="loadFactorLabel">92</span>%</span>
          </label>

          <label>
            행 수
            <input id="rows" type="range" min="8" max="30" value="18" step="1" />
            <span class="range-readout"><span id="rowsLabel">18</span>행</span>
          </label>

          <label>
            짐 싣는 평균 시간
            <input id="bagTime" type="range" min="1" max="8" value="4" step="1" />
            <span class="range-readout"><span id="bagTimeLabel">4</span>초</span>
          </label>

          <label>
            애니메이션 속도
            <input id="speed" type="range" min="1" max="10" value="5" step="1" />
            <span class="range-readout"><span id="speedLabel">5</span>x</span>
          </label>

          <div class="button-row">
            <button id="runBtn" type="button">시작</button>
            <button id="pauseBtn" type="button" class="secondary">일시정지</button>
            <button id="resetBtn" type="button" class="secondary">초기화</button>
          </div>

          <button id="compareBtn" type="button" class="wide">모든 방식 비교</button>
        </aside>

        <section class="sim-area">
          <div class="legend" aria-label="범례">
            <span><i class="legend-seat empty"></i>빈 좌석</span>
            <span><i class="legend-seat taken"></i>착석 완료</span>
            <span><i class="legend-dot moving"></i>이동 중</span>
            <span><i class="legend-dot loading"></i>짐 싣는 중</span>
          </div>
          <div class="aircraft-wrap">
            <div id="queue" class="queue" aria-label="탑승 대기열"></div>
            <div id="aircraft" class="aircraft" aria-label="항공기 좌석 배치"></div>
          </div>
        </section>
      </section>

      <section class="analytics">
        <div class="chart-panel">
          <div class="panel-title">
            <h2>방식별 비교</h2>
            <p>같은 승객 조건에서 각 방식의 예측 성능</p>
          </div>
          <div id="comparisonChart" class="chart"></div>
        </div>
        <div class="chart-panel">
          <div class="panel-title">
            <h2>현재 방식 해석</h2>
            <p id="strategyNote">시작 버튼을 눌러 통로 병목을 관찰하세요.</p>
          </div>
          <div id="events" class="events"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
